services:
  mongo:
    image: mongo:7
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db

  nats:
    image: nats:2
    ports:
      - "127.0.0.1:4222:4222"

  gateway:
    build:
      context: .
      args:
        SERVICE: gateway
    env_file:
      - .env
    depends_on:
      - mongo
      - nats

  tracker:
    build:
      context: .
      args:
        SERVICE: tracker
    env_file:
      - .env
    depends_on:
      - mongo
      - nats

  writer:
    build:
      context: .
      args:
        SERVICE: writer
    env_file:
      - .env
    depends_on:
      - mongo
      - nats

  commands:
    build:
      context: .
      args:
        SERVICE: commands
    env_file:
      - .env
    depends_on:
      - mongo
      - nats

volumes:
  mongo-data:
