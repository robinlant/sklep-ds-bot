name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    outputs:
      new_version: ${{ steps.semver.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Calculate next version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          dry_run: true
          commit_sha: ${{ github.event.workflow_run.head_sha }}

  publish:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [gateway, tracker, writer, commands, activity]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Repository name lowercase
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: SERVICE=${{ matrix.service }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:v${{ needs.version.outputs.new_version }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  tag:
    needs: [version, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Create and push tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ needs.version.outputs.new_version }}
          tag_prefix: v
          commit_sha: ${{ github.event.workflow_run.head_sha }}

  cleanup-publish:
    needs: [publish, version]
    if: ${{ always() && needs.publish.result == 'failure' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, tracker, writer, commands, activity]
    steps:
      - name: Delete partial SHA-tagged image
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.repository }}"
          REPO_NAME="${REPO_NAME#*/}"
          SERVICE="${{ matrix.service }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          PACKAGE="${REPO_NAME}%2F${SERVICE}"

          for PREFIX in "orgs" "users"; do
            VERSION_ID=$(gh api \
              "/${PREFIX}/${OWNER}/packages/container/${PACKAGE}/versions" \
              --paginate --jq ".[] | select(.metadata.container.tags[] == \"${SHA}\") | .id" 2>/dev/null) && break
          done

          if [ -n "${VERSION_ID:-}" ]; then
            for PREFIX in "orgs" "users"; do
              gh api --method DELETE \
                "/${PREFIX}/${OWNER}/packages/container/${PACKAGE}/versions/${VERSION_ID}" 2>/dev/null && break
            done
            echo "Deleted ${SERVICE}:${SHA}"
          fi
